<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Working system map</title>
  <desc id="desc">Animated map showing product sense, software systems, automation, AI workflows, operations, and documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="102" y1="158" x2="1090" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.34" stop-color="#a3e635"/>
      <stop offset="0.68" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .trace { stroke-dasharray: 18 20; animation: move 10s linear infinite; }
      @keyframes move { to { stroke-dashoffset: -260; } }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="278" rx="24" fill="url(#bg)" stroke="#334155"/>
  <path class="trace" d="M120 154 C258 56 318 242 468 148 C592 70 664 220 796 142 C914 72 994 196 1082 112" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>

  <text x="60" y="62" class="sans" fill="#f8fafc" font-size="30" font-weight="760">Working system</text>
  <text x="60" y="94" class="mono" fill="#94a3b8" font-size="15">from ambiguous problem to useful software</text>

  <g transform="translate(78 132)">
    <rect width="164" height="86" rx="18" fill="#020617" stroke="#38bdf8" stroke-opacity="0.8"/>
    <text x="82" y="36" text-anchor="middle" class="sans" fill="#e0f2fe" font-size="16" font-weight="700">Product sense</text>
    <text x="82" y="60" text-anchor="middle" class="mono" fill="#94a3b8" font-size="12">context first</text>
  </g>
  <g transform="translate(274 132)">
    <rect width="164" height="86" rx="18" fill="#020617" stroke="#a3e635" stroke-opacity="0.8"/>
    <text x="82" y="36" text-anchor="middle" class="sans" fill="#ecfccb" font-size="16" font-weight="700">Systems</text>
    <text x="82" y="60" text-anchor="middle" class="mono" fill="#94a3b8" font-size="12">APIs + flows</text>
  </g>
  <g transform="translate(470 132)">
    <rect width="164" height="86" rx="18" fill="#020617" stroke="#f59e0b" stroke-opacity="0.8"/>
    <text x="82" y="36" text-anchor="middle" class="sans" fill="#fed7aa" font-size="16" font-weight="700">Automation</text>
    <text x="82" y="60" text-anchor="middle" class="mono" fill="#94a3b8" font-size="12">remove friction</text>
  </g>
  <g transform="translate(666 132)">
    <rect width="164" height="86" rx="18" fill="#020617" stroke="#f472b6" stroke-opacity="0.8"/>
    <text x="82" y="36" text-anchor="middle" class="sans" fill="#fbcfe8" font-size="16" font-weight="700">AI workflows</text>
    <text x="82" y="60" text-anchor="middle" class="mono" fill="#94a3b8" font-size="12">better context</text>
  </g>
  <g transform="translate(862 132)">
    <rect width="164" height="86" rx="18" fill="#020617" stroke="#38bdf8" stroke-opacity="0.8"/>
    <text x="82" y="36" text-anchor="middle" class="sans" fill="#e0f2fe" font-size="16" font-weight="700">Operations</text>
    <text x="82" y="60" text-anchor="middle" class="mono" fill="#94a3b8" font-size="12">test + observe</text>
  </g>

  <g transform="translate(1048 50)">
    <circle cx="38" cy="38" r="36" fill="#020617" stroke="#64748b"/>
    <text x="38" y="35" text-anchor="middle" class="sans" fill="#f8fafc" font-size="13" font-weight="700">docs</text>
    <text x="38" y="53" text-anchor="middle" class="mono" fill="#94a3b8" font-size="11">that last</text>
  </g>
</svg>
