<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gabriel Bezerra — software for the real world</title>
  <desc id="desc">An Atlantic navigation-inspired profile banner. A circuit-board sailboat leaves Fortaleza while Gabriel's engineering focus is presented as software for the real world.</desc>
  <defs>
    <pattern id="sun-hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#0B3D45" stroke-opacity="0.16" stroke-width="3"/>
    </pattern>
    <pattern id="water-grid" width="56" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 40C14 32 28 32 42 40C49 44 53 44 56 42" stroke="#EAF2E6" stroke-opacity="0.055" stroke-width="1.5"/>
    </pattern>
    <clipPath id="sun-clip">
      <circle cx="965" cy="165" r="123"/>
    </clipPath>
  </defs>

  <rect width="1200" height="400" fill="#062B33"/>
  <rect x="12" y="12" width="1176" height="376" stroke="#43B8A5" stroke-width="2"/>
  <rect x="24" y="24" width="1152" height="352" fill="url(#water-grid)"/>

  <path d="M0 0H710L634 400H0V0Z" fill="#0B3D45"/>
  <path d="M710 0L634 400" stroke="#43B8A5" stroke-width="2"/>

  <circle cx="965" cy="165" r="123" fill="#F4C95D"/>
  <rect x="780" y="-30" width="370" height="356" fill="url(#sun-hatch)" clip-path="url(#sun-clip)"/>
  <circle cx="965" cy="165" r="137" stroke="#F4C95D" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="4 10"/>

  <text x="70" y="71" fill="#F4C95D" font-family="Arial Narrow, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3.4">GABRIEL BEZERRA · SOFTWARE ENGINEER</text>
  <path d="M70 91H214" stroke="#FF6B4A" stroke-width="6"/>

  <text x="66" y="172" fill="#EAF2E6" font-family="Georgia, Times New Roman, serif" font-size="67" font-weight="700" font-style="italic">Software for</text>
  <text x="66" y="242" fill="#EAF2E6" font-family="Georgia, Times New Roman, serif" font-size="67" font-weight="700" font-style="italic">the real world.</text>

  <text x="72" y="292" fill="#BFD8D3" font-family="Arial Narrow, Arial, sans-serif" font-size="18" letter-spacing="0.6">BACKEND SYSTEMS / DEVELOPER TOOLS</text>
  <text x="72" y="320" fill="#BFD8D3" font-family="Arial Narrow, Arial, sans-serif" font-size="18" letter-spacing="0.6">AUTOMATION / APPLIED AI</text>

  <text x="72" y="358" fill="#43B8A5" font-family="Courier New, monospace" font-size="13" font-weight="700">FORTALEZA, CE</text>
  <text x="196" y="358" fill="#7DBEB3" font-family="Courier New, monospace" font-size="13">03°43′S / 38°32′W</text>

  <g aria-label="A sailboat whose sail is a circuit diagram">
    <path d="M759 309C814 327 1018 327 1124 301L1094 338C1002 359 847 357 782 338L759 309Z" fill="#EAF2E6"/>
    <path d="M793 337C875 356 1001 354 1092 336" stroke="#FF6B4A" stroke-width="6"/>
    <path d="M912 108V310" stroke="#EAF2E6" stroke-width="7"/>
    <path d="M928 126V282H1068L928 126Z" fill="#FF6B4A"/>
    <path d="M898 143V282H805L898 143Z" fill="#43B8A5"/>
    <path d="M939 150V258H1037" stroke="#062B33" stroke-width="3"/>
    <path d="M939 190H982V224H1036" stroke="#062B33" stroke-width="3"/>
    <path d="M939 230H973V258" stroke="#062B33" stroke-width="3"/>
    <circle cx="939" cy="150" r="6" fill="#F4C95D" stroke="#062B33" stroke-width="3"/>
    <circle cx="982" cy="190" r="6" fill="#F4C95D" stroke="#062B33" stroke-width="3"/>
    <circle cx="1036" cy="224" r="6" fill="#F4C95D" stroke="#062B33" stroke-width="3"/>
    <circle cx="973" cy="258" r="6" fill="#F4C95D" stroke="#062B33" stroke-width="3"/>
    <circle cx="1037" cy="258" r="6" fill="#F4C95D" stroke="#062B33" stroke-width="3"/>
  </g>

  <path d="M680 351C723 335 753 341 790 351C829 362 860 361 899 349C942 336 978 339 1017 351C1056 363 1093 361 1146 340" stroke="#43B8A5" stroke-width="3"/>
  <path d="M680 370C723 354 753 360 790 370C829 381 860 380 899 368C942 355 978 358 1017 370C1056 382 1093 380 1146 359" stroke="#EAF2E6" stroke-opacity="0.42" stroke-width="2"/>

  <g fill="#F4C95D">
