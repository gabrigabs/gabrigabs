<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gabriel Bezerra profile hero</title>
  <desc id="desc">Animated software engineering profile hero with a terminal, system map, and product automation AI workflow theme.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="190" y1="120" x2="930" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0.18"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .flow { stroke-dasharray: 12 18; animation: dash 11s linear infinite; }
      .flow-fast { stroke-dasharray: 8 16; animation: dash 7s linear infinite; }
      .pulse { animation: pulse 3.4s ease-in-out infinite; transform-origin: center; }
      .pulse-delay { animation: pulse 4.2s ease-in-out infinite; animation-delay: 1.2s; transform-origin: center; }
      .float { animation: float 6s ease-in-out infinite; }
      .cursor { animation: blink 1.1s steps(2, start) infinite; }
      .scan { animation: scan 6s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -240; } }
      @keyframes pulse { 0%, 100% { opacity: .38; } 50% { opacity: 1; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes scan { 0%, 100% { transform: translateX(-260px); opacity: 0; } 20%, 75% { opacity: .5; } 100% { transform: translateX(420px); opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="430" rx="30" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="428" rx="29" stroke="#334155" stroke-opacity="0.8"/>
  <rect width="1200" height="430" rx="30" fill="url(#grid)"/>
  <circle cx="1040" cy="86" r="170" fill="#38bdf8" opacity="0.09"/>
  <circle cx="124" cy="354" r="190" fill="#a3e635" opacity="0.055"/>
  <path class="flow" d="M92 332 C230 250 282 326 408 210 C536 92 664 146 790 96 C898 53 986 66 1092 34" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <path class="flow-fast" d="M108 368 C286 306 348 366 492 282 C638 196 700 226 828 174 C940 128 1048 166 1120 112" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.34"/>

  <g class="float">
    <text x="70" y="108" class="sans" fill="#e5f3ff" font-size="62" font-weight="760">Gabriel Bezerra</text>
    <text x="74" y="148" class="mono" fill="#38bdf8" font-size="20">software engineer / product systems / automation</text>
    <text x="74" y="184" class="sans" fill="#cbd5e1" font-size="18">I build useful systems with clear context, practical AI workflows,</text>
    <text x="74" y="212" class="sans" fill="#cbd5e1" font-size="18">and enough operational discipline to keep them evolving.</text>
  </g>

  <g transform="translate(74 238)">
    <rect width="452" height="146" rx="18" fill="#020617" fill-opacity="0.78" stroke="#334155"/>
    <rect x="16" y="18" width="10" height="10" rx="5" fill="#f87171"/>
    <rect x="34" y="18" width="10" height="10" rx="5" fill="#fbbf24"/>
    <rect x="52" y="18" width="10" height="10" rx="5" fill="#22c55e"/>
    <text x="20" y="58" class="mono" fill="#94a3b8" font-size="15">$ current_focus --mode practical</text>
    <text x="20" y="88" class="mono" fill="#e2e8f0" font-size="16">product context + software systems</text>
    <text x="20" y="116" class="mono" fill="#a3e635" font-size="16">automation surfaces + AI workflows</text>
    <rect class="cursor" x="366" y="104" width="10" height="18" rx="2" fill="#38bdf8"/>
    <rect class="scan" x="28" y="134" width="220" height="2" rx="1" fill="#38bdf8"/>
  </g>

  <g transform="translate(620 102)" filter="url(#glow)">
    <circle class="pulse" cx="210" cy="110" r="78" stroke="#38bdf8" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle class="pulse-delay" cx="210" cy="110" r="122" stroke="#a3e635" stroke-opacity="0.34" stroke-width="1.5"/>
    <path class="flow" d="M210 110 L90 38 L74 184 L210 110 L358 50 L344 194 L210 110" stroke="#64748b" stroke-width="1.4" opacity="0.7"/>
    <g>
      <circle cx="210" cy="110" r="42" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
      <text x="210" y="105" text-anchor="middle" class="sans" fill="#f8fafc" font-size="15" font-weight="700">clear</text>
      <text x="210" y="125" text-anchor="middle" class="sans" fill="#94a3b8" font-size="13">systems</text>
    </g>
    <g class="pulse">
      <circle cx="90" cy="38" r="29" fill="#111827" stroke="#f59e0b" stroke-width="1.7"/>
      <text x="90" y="43" text-anchor="middle" class="sans" fill="#fde68a" font-size="12" font-weight="700">product</text>
    </g>
    <g class="pulse-delay">
      <circle cx="74" cy="184" r="31" fill="#111827" stroke="#a3e635" stroke-width="1.7"/>
      <text x="74" y="189" text-anchor="middle" class="sans" fill="#d9f99d" font-size="12" font-weight="700">automation</text>
    </g>
    <g class="pulse">
      <circle cx="358" cy="50" r="30" fill="#111827" stroke="#f472b6" stroke-width="1.7"/>
      <text x="358" y="55" text-anchor="middle" class="sans" fill="#fbcfe8" font-size="12" font-weight="700">AI</text>
    </g>
    <g class="pulse-delay">
      <circle cx="344" cy="194" r="32" fill="#111827" stroke="#38bdf8" stroke-width="1.7"/>
      <text x="344" y="198" text-anchor="middle" class="sans" fill="#bae6fd" font-size="12" font-weight="700">ops</text>
    </g>
  </g>

  <g transform="translate(882 318)">
    <text x="0" y="0" class="mono" fill="#64748b" font-size="13">portfolio</text>
    <text x="0" y="28" class="mono" fill="#e2e8f0" font-size="18">gabrielbezerra.com.br</text>
    <path d="M0 42 H236" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
